<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Global fetch compatibility patch to allow overwriting/wrapping of the read-only window.fetch property
      try {
        if (typeof window !== 'undefined' && window.fetch) {
          var originalFetch = window.fetch;
          var localFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return localFetch;
            },
            set: function(val) {
              localFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn("Global fetch compatibility patch bypassed:", e);
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json" />
    <title>Aether Mobile</title>
  </head>
  <body class="bg-[#111] text-white">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
